<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Parts Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .admin-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--primary-text);
            padding: 10px 20px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .admin-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-glow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary-text);
        }

        .form-wrapper {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--card-border);
        }

        .success-msg {
            color: #2ed573;
            display: none;
            margin-top: 15px;
        }

        .error-msg {
            color: #ff4757;
            display: none;
            margin-top: 15px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="app-container" style="max-width: 800px;">
        <div class="background-effects">
            <div class="blur-blob blob-1"></div>
        </div>

        <header class="main-header" style="margin-bottom: 1.5rem;">
            <h1>Admin <span>Panel</span></h1>
            <p style="color: var(--secondary-text)">Add vehicles and parts to your database</p>
        </header>

        <main class="main-content">
            <div class="admin-nav">
                <button class="admin-btn active" id="nav-vehicle" onclick="switchSection('vehicle')">Add
                    Vehicle</button>
                <button class="admin-btn" id="nav-part" onclick="switchSection('part')">Add Part</button>
                <a href="/" style="margin-left:auto; color: var(--accent-glow); text-decoration: none;">&larr; Back to
                    App</a>
            </div>

            <!-- Vehicle Form -->
            <div id="section-vehicle" class="form-section active form-wrapper">
                <h2 style="margin-bottom: 20px; font-weight: 500;">Create Vehicle Configuration</h2>
                <form id="vehicleForm">
                    <div class="form-group">
                        <label>Brand (e.g., Toyota)</label>
                        <input type="text" id="v-brand" class="premium-input" required>
                    </div>
                    <div class="form-group">
                        <label>Model (e.g., Camry)</label>
                        <input type="text" id="v-model" class="premium-input" required>
                    </div>
                    <div class="form-group">
                        <label>Sub Model (e.g., LE, XSE)</label>
                        <input type="text" id="v-submodel" class="premium-input" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Save
                        Vehicle</button>
                    <p id="v-success" class="success-msg">Vehicle added successfully!</p>
                    <p id="v-error" class="error-msg">Error adding vehicle.</p>
                </form>
            </div>

            <!-- Part Form -->
            <div id="section-part" class="form-section form-wrapper">
                <h2 style="margin-bottom: 20px; font-weight: 500;">Add New Part</h2>
                <form id="partForm">
                    <div class="form-group">
                        <label>Part Type</label>
                        <select id="p-type" onchange="togglePartType()" style="width:100%" class="premium-input">
                            <option value="Genuine">Genuine Part (Matches specific vehicle)</option>
                            <option value="OEM">OEM / Alternative (Matches genuine parts)</option>
                        </select>
                    </div>
                    <div class="form-group" id="p-vehicle-div">
                        <label>Assign to Vehicle</label>
                        <select id="p-vehicle-id" required style="width:100%">
                            <option value="">Loading vehicles...</option>
                        </select>
                    </div>
                    <div class="form-group" id="p-oem-brand-div" style="display: none;">
                        <label>OEM Brand Name (e.g., Bosch)</label>
                        <input type="text" id="p-brand" class="premium-input">
                    </div>
                    <div class="form-group">
                        <label>Part Number</label>
                        <input type="text" id="p-number" class="premium-input" required>
                    </div>
                    <div class="form-group">
                        <label>Part Name / Description</label>
                        <input type="text" id="p-name" class="premium-input" required>
                    </div>
                    <div class="form-group">
                        <label>Category / Type (e.g., Brake Pads)</label>
                        <input type="text" id="p-category" class="premium-input" required>
                    </div>
                    <div class="form-group" id="p-compatible-div" style="display: none;">
                        <label>Compatible Genuine Part Numbers (comma-separated)</label>
                        <input type="text" id="p-compatible" class="premium-input" placeholder="e.g., TOY-1234, HON-555">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Save
                        Part</button>
                    <p id="p-success" class="success-msg">Part added successfully!</p>
                    <p id="p-error" class="error-msg">Error adding part.</p>
                </form>
            </div>

        </main>
    </div>

    <script>
        // Navigation Logic
        function switchSection(section) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.admin-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`section-${section}`).classList.add('active');
            document.getElementById(`nav-${section}`).classList.add('active');

            if (section === 'part') loadVehicles();
        }

        // Add Vehicle
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                brand: document.getElementById('v-brand').value,
                model: document.getElementById('v-model').value,
                submodel: document.getElementById('v-submodel').value
            };

            try {
                const res = await fetch('/api/vehicles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    document.getElementById('v-success').style.display = 'block';
                    document.getElementById('v-error').style.display = 'none';
                    e.target.reset();
                    setTimeout(() => document.getElementById('v-success').style.display = 'none', 3000);
                } else {
                    document.getElementById('v-error').textContent = (await res.json()).error;
                    document.getElementById('v-error').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('v-error').style.display = 'block';
            }
        });

        // Load Vehicles for Part assignment
        async function loadVehicles() {
            try {
                const res = await fetch('/api/vehicles/raw');
                const vehicles = await res.json();
                const sel = document.getElementById('p-vehicle-id');
                sel.innerHTML = '<option value="" disabled selected>Select a vehicle...</option>';
                vehicles.forEach(v => {
                    sel.innerHTML += `<option value="${v.id}">${v.brand.toUpperCase()} ${v.model} (${v.submodel})</option>`;
                });
            } catch (e) {
                console.error("Failed to load vehicles", e);
            }
        }

        // Toggle Form Fields based on Part Type
        function togglePartType() {
            const type = document.getElementById('p-type').value;
            const vehicleDiv = document.getElementById('p-vehicle-div');
            const oemBrandDiv = document.getElementById('p-oem-brand-div');
            const compatibleDiv = document.getElementById('p-compatible-div');
            const vehicleSelect = document.getElementById('p-vehicle-id');

            if (type === 'Genuine') {
                vehicleDiv.style.display = 'block';
                oemBrandDiv.style.display = 'none';
                compatibleDiv.style.display = 'none';
                vehicleSelect.setAttribute('required', 'true');
            } else {
                vehicleDiv.style.display = 'none';
                oemBrandDiv.style.display = 'block';
                compatibleDiv.style.display = 'block';
                vehicleSelect.removeAttribute('required');
            }
        }

        // Add Part
        document.getElementById('partForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                part_type: document.getElementById('p-type').value,
                brand: document.getElementById('p-brand').value,
                vehicle_id: document.getElementById('p-vehicle-id').value,
                part_number: document.getElementById('p-number').value,
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-category').value,
                compatible_genuine_numbers: document.getElementById('p-compatible').value
            };

            try {
                const res = await fetch('/api/parts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    document.getElementById('p-success').style.display = 'block';
                    document.getElementById('p-error').style.display = 'none';
                    e.target.reset();
                    setTimeout(() => document.getElementById('p-success').style.display = 'none', 3000);
                } else {
                    document.getElementById('p-error').textContent = (await res.json()).error;
                    document.getElementById('p-error').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('p-error').style.display = 'block';
            }
        });
    </script>
</body>

</html>
